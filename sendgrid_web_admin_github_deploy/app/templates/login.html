<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Login - SendGrid Web Admin</title>
  <style>
    body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:#f5f7fb;height:100vh;display:grid;place-items:center;color:#182033}
    .box{width:380px;background:white;border:1px solid #e6e9f2;border-radius:18px;box-shadow:0 15px 40px rgba(24,32,51,.1);padding:28px}
    h1{margin:0 0 8px;font-size:24px}
    p{color:#7b8499;margin:0 0 20px}
    label{font-size:12px;color:#7b8499;font-weight:700;display:block;margin:12px 0 6px}
    input{width:100%;height:42px;border:1px solid #e6e9f2;border-radius:12px;padding:0 12px;box-sizing:border-box}
    button{width:100%;height:42px;border:0;background:#316bff;color:white;border-radius:12px;font-weight:800;margin-top:18px;cursor:pointer}
    .err{background:#ffe9ee;color:#b10f2e;border-radius:10px;padding:10px;margin-bottom:12px;font-size:13px}
  </style>
</head>
<body>
  <form class="box" method="post" action="/login">
    <h1>SendGrid Web Admin</h1>
    <p>多通道 · 多代理 · 随机任务 · 团队协作</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label>账号</label>
    <input name="username" value="admin">
    <label>密码</label>
    <input name="password" type="password" placeholder="请输入密码">
    <button type="submit">登录</button>
  </form>
</body>
</html>
